variables:
  - group: PRG-dev-automation
  - name: analysisProject
    value: sample-connect-streams_creating_reading_and_writing_data

trigger:
  batch: true
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

schedules:
  - cron: '0 0 * * 0'
    displayName: Weekly build
    branches:
      include:
        - main
    always: true

resources:
  repositories:
    - repository: ArchitectureRepo
      type: git
      name: Architecture/Architecture
      ref: refs/heads/main
    - repository: templates
      type: github
      name: AVEVA/pipelines-templates
      endpoint: AVEVA
    - repository: antiMalwareTemplate
      name: Architecture/Architecture 
      ref: refs/heads/antiMalwareVersions/0.1
      type: git

jobs:

  - template: '/code-analysis/code-analysis.yml@templates'
    parameters:
      poolForExecution: Cloud Platform CONNECT v2 Development
      useRequirementsTxt: true
      buildSteps:
        - script: |
            echo "Installing Python dependencies"
            python -c "import sys; print(sys.executable)"
            python -m pip --version
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt
            python -m pip install pytest
            python -m pip freeze
          displayName: 'Install Python dependencies'
        - script: |
            echo "Running tests"
            python -c "import os; os.makedirs(r'$(Build.SourcesDirectory)/test-results', exist_ok=True)"
            python -m pytest -q --junitxml="$(Build.SourcesDirectory)/test-results/pytest.xml"
          displayName: 'Run pytest'
        - task: PublishTestResults@2
          displayName: 'Publish pytest results'
          condition: succeededOrFailed()
          inputs:
            testResultsFormat: 'JUnit'
            testResultsFiles: '$(Build.SourcesDirectory)/test-results/pytest.xml'
            failTaskOnFailedTests: true
            testRunTitle: 'Python unit tests'